name: TMAS Source Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Daily at 12:30 PM EDT (16:30 UTC)
    - cron: '30 16 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tmas-scan:
    name: Scan Source Code
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Note: Container image build skipped — base image openjdk:8-jdk has
      # been removed from Docker Hub. Source code scan only.
      - name: TMAS Vulnerability + Secret Scan (source)
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          vulnerabilitiesScan: true
          malwareScan: false
          secretsScan: true
          artifact: dir:.
          additionalArgs: --region=us-east-1 --evaluatePolicy
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
